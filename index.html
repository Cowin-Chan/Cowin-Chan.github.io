<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cowin Chan | Portfolio</title>
    <style>
        /* ponytail: Single file, no external dependencies or frameworks. Native system fonts. */
        :root {
            --bg: #0B0C10;
            --surface: #1F2833;
            --primary: #66FCF1;
            --text: #C5C6C7;
            --white: #FFFFFF;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 4rem 2rem 2rem;
            max-width: 800px;
        }

        h1 {
            color: var(--white);
            font-size: 3.5rem;
            margin: 0 0 1rem 0;
            background: linear-gradient(90deg, var(--white), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        p.subtitle {
            font-size: 1.25rem;
            margin: 0;
            color: var(--text);
            font-weight: 300;
        }

        main {
            width: 100%;
            max-width: 1000px;
            padding: 2rem;
            box-sizing: border-box;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        /* Project Card Styling */
        .project-card {
            background: var(--surface);
            border-radius: 16px;
            padding: 2rem;
            text-decoration: none;
            color: inherit;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .project-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--primary);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            border-color: rgba(102, 252, 241, 0.2);
        }

        .project-card:hover::before {
            opacity: 1;
        }

        .project-card h2 {
            margin: 0;
            color: var(--white);
            font-size: 1.5rem;
        }

        .project-card p {
            margin: 0;
            font-size: 1rem;
            flex-grow: 1;
        }

        .tags {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .tag {
            background: rgba(102, 252, 241, 0.1);
            color: var(--primary);
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 500;
        }
    </style>
</head>

<body>

    <header>
        <h1>Cowin Chan</h1>
        <p class="subtitle">Software Engineer & Creator</p>
    </header>

    <main>
        <div class="projects-grid">

            <!-- 
                ponytail: To add a new project, just copy this block below and change the text.
                No JS configs needed. HTML is already declarative data. Just change the href!
            -->
            <!-- START PROJECT -->
            <a href="/TrendEase" class="project-card">
                <h2>TrendEase</h2>
                <p>A modern web application built with React, TypeScript, and Vite.</p>
                <div class="tags">
                    <span class="tag">React</span>
                    <span class="tag">TypeScript</span>
                    <span class="tag">Vite</span>
                </div>
            </a>
            <!-- END PROJECT -->

            <!-- START PROJECT -->
            <!-- <a href="/another-project" class="project-card">
                <h2>Example Project</h2>
                <p>This is a placeholder for your next awesome creation. Just copy this block to add more!</p>
                <div class="tags">
                    <span class="tag">HTML</span>
                    <span class="tag">CSS</span>
                </div>
            </a> -->
            <!-- END PROJECT -->

        </div>
    </main>

</body>

</html>
